<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coremap — Know Your Core</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:         #0E0C0A;
  --bg-2:       #161310;
  --bg-3:       #1E1A16;
  --surface:    #1A1612;
  --surface-2:  #242018;
  --ink:        #F0EBE3;
  --ink-2:      #A09080;
  --ink-3:      #5A5048;
  --gold:       #C8A96E;
  --gold-2:     #E8C98E;
  --gold-dim:   rgba(200,169,110,0.10);
  --rose:       #C47B6B;
  --rose-dim:   rgba(196,123,107,0.10);
  --green:      #6B9E7A;
  --green-dim:  rgba(107,158,122,0.10);
  --border:     rgba(200,169,110,0.14);
  --border-2:   rgba(240,235,227,0.06);
  --r:          16px;
  --r-sm:       10px;
  --ease:       cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Instrument Sans',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,rgba(200,169,110,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%,rgba(196,123,107,0.05) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 20px 120px;}

/* ── LANG BAR ── */
.lang-bar{display:flex;justify-content:space-between;align-items:center;padding:20px 0 0;}
.lang-btns{display:flex;gap:4px;}
.lang-btn{
  background:none;border:1px solid var(--border-2);
  color:var(--ink-3);font-family:'Instrument Sans',sans-serif;
  font-size:10.5px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;padding:5px 13px;
  border-radius:99px;cursor:pointer;transition:all .25s var(--ease);
}
.lang-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--border);}
.lang-btn:hover:not(.active){color:var(--ink-2);border-color:var(--border);}
.logo-small{
  font-family:'Instrument Serif',serif;
  font-size:16px;letter-spacing:.2em;color:var(--gold);
  text-transform:uppercase;
}

/* ── HEADER ── */
.app-header{padding:52px 0 44px;text-align:center;animation:fadeDown .8s var(--ease) both;}
.header-line{
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin-bottom:36px;
}
.header-rule{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.header-rule.flip{transform:scaleX(-1);}
.header-logo{
  font-family:'Instrument Serif',serif;
  font-size:12px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;
}
.hero-tag{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink-3);font-weight:500;margin-bottom:18px;
}
h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(34px,7vw,54px);
  font-weight:400;line-height:1.1;
  color:var(--ink);margin-bottom:18px;
}
h1 em{font-style:italic;color:var(--gold);}
.hero-sub{
  font-size:16px;color:var(--ink-2);font-weight:300;
  max-width:460px;margin:0 auto 28px;line-height:1.85;
}
.proof-row{
  display:flex;align-items:center;justify-content:center;
  gap:6px;flex-wrap:wrap;margin-bottom:0;
}
.proof-item{font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:6px;}
.proof-sep{width:3px;height:3px;border-radius:50%;background:var(--ink-3);opacity:.3;}

/* ── CARDS ── */
.card{
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:var(--r);
  padding:36px;
  box-shadow:0 2px 32px rgba(0,0,0,0.3);
  animation:fadeUp .5s var(--ease) both;
  position:relative;overflow:hidden;
}
.card+.card{margin-top:16px;}
.card-gold-top::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* ── HOOK ── */
.hook-card{margin-bottom:20px;}
.hook-q{
  font-family:'Instrument Serif',serif;
  font-size:clamp(19px,3.5vw,25px);
  line-height:1.4;color:var(--ink);
  margin-bottom:22px;font-style:italic;
}
.hook-list{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:26px;}
.hook-list li{
  font-size:14px;color:var(--ink-2);
  padding-left:22px;position:relative;line-height:1.65;
}
.hook-list li::before{content:'→';position:absolute;left:0;color:var(--gold);font-size:12px;top:3px;}
.hook-cta-text{
  font-size:14px;color:var(--ink-2);
  border-left:2px solid var(--border);
  padding-left:16px;line-height:1.7;
}
.hook-cta-text strong{color:var(--gold);font-weight:500;}

/* ── PROGRESS ── */
.progress-wrap{margin:0 0 28px;animation:fadeUp .5s .1s var(--ease) both;}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.progress-label{font-size:11.5px;color:var(--ink-3);font-weight:500;letter-spacing:.04em;}
.progress-pct{font-size:12px;font-weight:600;color:var(--gold);}
.progress-track{height:2px;background:var(--surface-2);border-radius:99px;overflow:hidden;}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold-2));
  border-radius:99px;transition:width .7s var(--ease);
}
.chapter-pills{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap;}
.cpill{
  padding:3px 10px;border-radius:99px;
  font-size:10px;font-weight:500;letter-spacing:.06em;
  background:var(--surface-2);color:var(--ink-3);
  border:1px solid var(--border-2);transition:all .3s var(--ease);
}
.cpill.done{background:var(--gold-dim);color:var(--gold);border-color:var(--border);}
.cpill.active{background:var(--gold);color:var(--bg);border-color:var(--gold);}

/* ── QUESTION ── */
.q-chapter{
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);font-weight:500;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.q-chapter::after{content:'';flex:1;height:1px;background:var(--gold-dim);}
.q-num{font-size:11px;color:var(--ink-3);margin-bottom:8px;font-weight:500;}
.q-text{
  font-family:'Instrument Serif',serif;
  font-size:clamp(19px,3.5vw,24px);
  font-weight:400;line-height:1.4;
  color:var(--ink);margin-bottom:10px;
}
.q-hint{
  font-size:13.5px;color:var(--ink-3);
  font-style:italic;margin-bottom:22px;
  padding-left:14px;border-left:2px solid var(--border-2);
  line-height:1.65;
}
.q-context{
  background:var(--gold-dim);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:14px 16px;margin-bottom:22px;
  font-size:13px;color:var(--ink-2);line-height:1.65;
}
.q-context strong{
  display:block;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);
  font-weight:600;margin-bottom:6px;
}
textarea{
  width:100%;min-height:120px;
  border:1px solid var(--border-2);
  border-radius:var(--r-sm);
  padding:16px 18px;
  font-family:'Instrument Sans',sans-serif;
  font-size:15px;color:var(--ink);
  background:var(--bg-3);resize:vertical;
  outline:none;line-height:1.65;
  transition:border-color .3s var(--ease),box-shadow .3s var(--ease);
}
textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,0.08);}
textarea::placeholder{color:var(--ink-3);}
.char-count{font-size:11px;color:var(--ink-3);text-align:right;margin-top:6px;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;align-items:center;}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 26px;border-radius:99px;
  font-family:'Instrument Sans',sans-serif;
  font-size:14px;font-weight:500;
  cursor:pointer;border:none;
  transition:all .3s var(--ease);
  text-decoration:none;
}
.btn-gold{
  background:var(--gold);color:var(--bg);
  box-shadow:0 3px 16px rgba(200,169,110,0.3);
}
.btn-gold:hover{background:var(--gold-2);transform:translateY(-1px);box-shadow:0 5px 24px rgba(200,169,110,0.4);}
.btn-ghost{
  background:transparent;color:var(--ink-2);
  border:1px solid var(--border-2);
}
.btn-ghost:hover{background:var(--surface-2);color:var(--ink);border-color:var(--border);}
.btn-rose{
  background:var(--rose);color:#fff;
  box-shadow:0 3px 16px rgba(196,123,107,0.3);
}
.btn-rose:hover{background:#b06b5c;transform:translateY(-1px);}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
.skip-link{
  background:none;border:none;color:var(--ink-3);
  font-size:12.5px;cursor:pointer;padding:4px 0;
  font-family:'Instrument Sans',sans-serif;
  text-decoration:underline;text-underline-offset:3px;
  transition:color .2s;
}
.skip-link:hover{color:var(--ink-2);}

/* ── FOLLOWUP ── */
.followup-box{
  background:var(--green-dim);
  border:1px solid rgba(107,158,122,0.15);
  border-radius:var(--r-sm);
  padding:16px 18px;margin-top:16px;
  animation:fadeUp .4s var(--ease) both;
}
.followup-box .fl{
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--green);font-weight:600;margin-bottom:8px;
}
.followup-box p{font-size:13.5px;color:var(--ink-2);line-height:1.65;}

/* ── PREVIEW / PAYWALL ── */
.preview-section{animation:fadeUp .5s var(--ease) both;}
.preview-header{text-align:center;padding:28px 0 32px;}
.preview-header h2{
  font-family:'Instrument Serif',serif;
  font-size:clamp(24px,5vw,36px);font-weight:400;
  margin-bottom:12px;
}
.preview-header h2 em{font-style:italic;color:var(--gold);}
.preview-header p{color:var(--ink-2);font-size:15px;font-weight:300;line-height:1.75;}

.preview-belief{
  background:var(--surface);border:1px solid var(--border-2);
  border-radius:var(--r);padding:24px 28px;
  margin-bottom:14px;position:relative;overflow:hidden;
  animation:fadeUp .4s var(--ease) both;
}
.preview-belief::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:2px;background:var(--gold);
}
.pb-area{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:8px;
}
.pb-text{
  font-family:'Instrument Serif',serif;
  font-size:18px;line-height:1.4;color:var(--ink);
  margin-bottom:8px;
}
.pb-insight{font-size:13px;color:var(--ink-2);line-height:1.65;}

.paywall-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:40px 36px;text-align:center;
  position:relative;overflow:hidden;
  margin-top:8px;
}
.paywall-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.paywall-lock{
  width:56px;height:56px;
  background:var(--gold-dim);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin:0 auto 20px;
  border:1px solid var(--border);
}
.paywall-card h3{
  font-family:'Instrument Serif',serif;
  font-size:clamp(20px,4vw,28px);font-weight:400;
  margin-bottom:12px;
}
.paywall-card h3 em{font-style:italic;color:var(--gold);}
.paywall-card p{
  font-size:14px;color:var(--ink-2);
  max-width:400px;margin:0 auto 24px;line-height:1.75;
}
.paywall-features{
  display:flex;flex-direction:column;gap:8px;
  margin-bottom:28px;text-align:left;
  max-width:340px;margin-left:auto;margin-right:auto;
}
.pw-feature{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13.5px;color:var(--ink-2);line-height:1.5;
}
.pw-check{color:var(--gold);font-size:14px;margin-top:1px;flex-shrink:0;}
.price-row{
  display:flex;align-items:center;justify-content:center;
  gap:12px;margin-bottom:24px;
}
.price-amount{
  font-family:'Instrument Serif',serif;
  font-size:42px;font-weight:400;color:var(--ink);
}
.price-label{font-size:12px;color:var(--ink-3);text-align:left;line-height:1.4;}
.price-label strong{display:block;color:var(--ink-2);font-weight:500;}
.paywall-note{font-size:11.5px;color:var(--ink-3);margin-top:14px;}

/* ── ANALYSIS LOADING ── */
.analysis-loading{
  text-align:center;padding:48px 24px;
  animation:fadeUp .4s var(--ease) both;
}
.loading-orb{
  width:64px;height:64px;
  background:var(--gold-dim);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 24px;
  border:1px solid var(--border);
  animation:pulse 2s ease infinite;
}
.loading-text{
  font-family:'Instrument Serif',serif;
  font-size:20px;color:var(--ink);margin-bottom:10px;
}
.loading-sub{font-size:13px;color:var(--ink-3);}
.loading-steps{
  display:flex;flex-direction:column;gap:8px;
  max-width:280px;margin:24px auto 0;
  text-align:left;
}
.loading-step{
  font-size:12.5px;color:var(--ink-3);
  display:flex;align-items:center;gap:10px;
  transition:color .4s;
}
.loading-step.done{color:var(--gold);}
.ls-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--ink-3);flex-shrink:0;
  transition:background .4s;
}
.loading-step.done .ls-dot{background:var(--gold);}

/* ── FULL REPORT ── */
.report-section{animation:fadeUp .5s var(--ease) both;}
.report-hero{text-align:center;padding:28px 0 36px;}
.report-hero h2{
  font-family:'Instrument Serif',serif;
  font-size:clamp(26px,5vw,38px);font-weight:400;margin-bottom:12px;
}
.report-hero h2 em{font-style:italic;color:var(--gold);}
.report-hero p{color:var(--ink-2);font-size:15px;font-weight:300;line-height:1.75;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.stat-tile{
  background:var(--surface);border:1px solid var(--border-2);
  border-radius:var(--r-sm);padding:20px 14px;text-align:center;
  box-shadow:0 2px 20px rgba(0,0,0,0.2);
}
.stat-n{
  font-family:'Instrument Serif',serif;
  font-size:32px;font-weight:400;color:var(--gold);
  line-height:1;margin-bottom:6px;
}
.stat-l{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.12em;font-weight:500;}

.ai-analysis-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:32px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.ai-analysis-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.ai-label{
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.ai-label::after{content:'';flex:1;height:1px;background:var(--gold-dim);}
.ai-text{
  font-size:15px;color:var(--ink-2);line-height:1.85;
  white-space:pre-wrap;
}
.ai-text strong{color:var(--ink);font-weight:500;}

.belief-card{
  background:var(--surface);border:1px solid var(--border-2);
  border-radius:var(--r);padding:26px 28px;
  margin-bottom:14px;position:relative;overflow:hidden;
  transition:border-color .3s var(--ease);
}
.belief-card::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:2px;background:var(--border-2);transition:background .4s;
}
.belief-card.enabling::after{background:var(--green);}
.belief-card.limiting::after{background:var(--rose);}
.belief-card.neutral::after{background:var(--gold);}
.b-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.b-num{font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:.1em;}
.b-area{
  font-size:10px;padding:3px 10px;border-radius:99px;
  background:var(--surface-2);color:var(--ink-3);
  border:1px solid var(--border-2);font-weight:500;letter-spacing:.06em;
}
.b-quote{
  font-family:'Instrument Serif',serif;
  font-size:clamp(17px,3vw,21px);font-weight:400;
  line-height:1.4;color:var(--ink);margin-bottom:10px;
}
.b-insight{font-size:13px;color:var(--ink-2);line-height:1.65;margin-bottom:14px;}
.b-origin{
  font-size:12px;color:var(--ink-3);
  display:inline-flex;align-items:center;gap:6px;
  margin-bottom:16px;
}
.rating-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.rbadge{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 13px;border-radius:99px;
  font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid transparent;transition:all .25s var(--ease);
}
.rb-g{background:var(--green-dim);color:var(--green);border-color:rgba(107,158,122,0.2);}
.rb-g.on,.rb-g:hover{background:var(--green);color:#fff;}
.rb-r{background:var(--rose-dim);color:var(--rose);border-color:rgba(196,123,107,0.2);}
.rb-r.on,.rb-r:hover{background:var(--rose);color:#fff;}
.rb-n{background:var(--gold-dim);color:var(--gold);border-color:var(--border);}
.rb-n.on,.rb-n:hover{background:var(--gold);color:var(--bg);}
.refl-label{font-size:10px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:7px;margin-top:12px;display:block;}
.refl-input{
  width:100%;border:1px solid var(--border-2);
  border-radius:var(--r-sm);padding:12px 15px;
  font-family:'Instrument Sans',sans-serif;font-size:13.5px;
  color:var(--ink);background:var(--bg-3);resize:none;
  outline:none;transition:border-color .3s;
  line-height:1.55;min-height:72px;
}
.refl-input:focus{border-color:var(--gold);}

/* New beliefs */
.new-beliefs-card{
  background:var(--gold-dim);border:1px solid var(--border);
  border-radius:var(--r);padding:28px;margin-bottom:20px;
}
.nb-label{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:16px;
}
.new-belief-item{
  padding:14px 0;border-bottom:1px solid rgba(200,169,110,0.1);
  font-family:'Instrument Serif',serif;
  font-size:17px;line-height:1.45;color:var(--ink);
}
.new-belief-item:last-child{border-bottom:none;}

/* Action plan */
.action-card{
  background:var(--surface);border:1px solid var(--border-2);
  border-radius:var(--r);padding:28px;margin-bottom:20px;
}
.ac-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:16px;}
.action-step{
  display:flex;gap:14px;padding:12px 0;
  border-bottom:1px solid var(--border-2);
}
.action-step:last-child{border-bottom:none;}
.as-num{
  width:28px;height:28px;border-radius:50%;
  background:var(--gold-dim);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--gold);
  flex-shrink:0;margin-top:2px;
}
.as-text{font-size:14px;color:var(--ink-2);line-height:1.65;}
.as-text strong{display:block;color:var(--ink);font-weight:500;margin-bottom:3px;}

/* Save bar */
.save-bar{
  background:var(--surface);border:1px solid var(--border-2);
  border-radius:var(--r);padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:20px;flex-wrap:wrap;
}
.sb-info strong{display:block;font-size:13.5px;font-weight:500;margin-bottom:2px;}
.sb-info span{font-size:12px;color:var(--ink-3);}
.sb-btns{display:flex;gap:8px;flex-wrap:wrap;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--surface-2);color:var(--ink);
  border:1px solid var(--border);
  padding:11px 22px;border-radius:99px;
  font-size:13px;font-weight:500;
  opacity:0;transition:all .4s var(--ease);
  pointer-events:none;z-index:999;white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── PHASES ── */
.phase{display:none;}
.phase.active{display:block;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .card{padding:22px 18px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .save-bar{flex-direction:column;align-items:flex-start;}
  .paywall-card{padding:28px 20px;}
}
@media print{

}

const SK = 'coremap_v1';
let lang = 'de';
let S = {phase:'welcome',idx:0,answers:{},beliefs:[],ratings:{},reflections:{},aiAnalysis:null,paid:false};

function t(k){ return T[lang][k] || T['de'][k] || k; }
function questions(){ return lang==='de'?QUESTIONS_DE:QUESTIONS_EN; }
function beliefs(){ return lang==='de'?BELIEFS_DE:BELIEFS_EN; }
function save(){ try{localStorage.setItem(SK,JSON.stringify({...S,lang}))}catch(e){} }
function load(){ try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null;}catch(e){return null;} }

// LANGUAGE
// ══════════════════════════════════════════════
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.getElementById('btn-de').classList.toggle('active',l==='de');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  renderI18n();
  save();
}

function renderI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    const v=t(k);
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') el.placeholder=v;
    else el.innerHTML=v;
  });
  // Hook list
  const hl=document.getElementById('hookList');
  if(hl){ hl.innerHTML=''; t('hook_items').forEach(item=>{const li=document.createElement('li');li.textContent=item;hl.appendChild(li);}); }
  // Paywall features
  const pf=document.getElementById('pwFeatures');
  if(pf){ pf.innerHTML=''; t('pw_features').forEach(f=>{pf.innerHTML+=`<div class="pw-feature"><span class="pw-check">✓</span><span>${f}</span></div>`;}); }
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function showPhase(id){
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById('phase-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function checkSaved(){
  const d=load();
  if(d&&d.idx>0){
    S=d; lang=d.lang||'de'; setLang(lang);
    if(S.phase==='report'&&S.aiAnalysis){ showFullReport(); }
    else if(S.phase==='preview'){ generatePreview(); showPhase('preview'); }
    else{ S.phase='questions'; showPhase('questions'); buildPills(); renderQ(); }
    toast(t('toast_loaded'));
  } else { toast(t('toast_not_found')); }
}

function startProcess(){
  S.phase='questions'; S.idx=0;
  showPhase('questions');
  buildPills(); renderQ();
}

function buildPills(){
  const wrap=document.getElementById('chapterPills');
  if(!wrap) return;
  wrap.innerHTML='';
  t('chapters').forEach((ch,i)=>{
    const el=document.createElement('div');
    el.className='cpill';el.id='cpill-'+i;el.textContent=ch;
    wrap.appendChild(el);
  });
}

function updateProgress(){
  const qs=questions();
  const total=qs.length; const done=S.idx;
  const pct=Math.round((done/total)*100);
  const pf=document.getElementById('progressFill');
  const pp=document.getElementById('progressPct');
  const pl=document.getElementById('progressLabel');
  if(pf) pf.style.width=pct+'%';
  if(pp) pp.textContent=pct+'%';
  const q=qs[Math.min(done,total-1)];
  if(pl) pl.textContent=`${t('chapter_label')} ${q.chapter+1}: ${t('chapters')[q.chapter]} · ${t('q_step')} ${done+1} ${t('q_of')} ${total}`;
  const chaptersDone=new Set(qs.slice(0,done).map(q=>q.chapter));
  t('chapters').forEach((_,i)=>{
    const p=document.getElementById('cpill-'+i);
    if(!p) return;
    const cur=q.chapter;
    p.className='cpill'+(chaptersDone.has(i)?' done':'')+(i===cur?' active':'');
  });
}

// ══════════════════════════════════════════════
// QUESTION RENDERING
// ══════════════════════════════════════════════
function renderQ(){
  updateProgress();
  const qs=questions();
  if(S.idx>=qs.length){ generatePreview(); showPhase('preview'); return; }
  const q=qs[S.idx];
  const saved=S.answers[q.id]||'';
  const isLast=S.idx===qs.length-1;
  const html=`
    <div class="card card-gold-top" id="qCard" style="animation-delay:.04s">
      <div class="q-chapter">${S.idx+1 <= 2?'●':'●'} ${t('chapters')[q.chapter]}</div>
      <div class="q-num">${t('q_step')} ${S.idx+1} ${t('q_of')} ${qs.length}</div>
      <div class="q-text">${q.question}</div>
      ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
      ${q.context?`<div class="q-context"><strong>${t('context_label')}</strong>${q.context}</div>`:''}
      <textarea id="ta" placeholder="…" oninput="onInput(this)">${saved}</textarea>
      <div class="char-count" id="cc">${saved.length}</div>
      <div class="btn-row">
        <button class="btn btn-gold" id="nextBtn" onclick="nextQ()" ${!saved?'disabled':''}>
          ${isLast?t('finish_btn'):t('next_btn')}
        </button>
        ${S.idx>0?`<button class="btn btn-ghost" onclick="prevQ()">${t('back_btn')}</button>`:''}
        <button class="skip-link" onclick="skipQ()">${t('skip_btn')}</button>
      </div>
    </div>
    ${saved&&q.followUp?`<div class="card followup-box" id="fuBox" style="animation-delay:.1s"><div class="fl">${t('followup_label')}</div><p>${q.followUp}</p></div>`:''}
  `;
  const area=document.getElementById('questionArea');
  area.innerHTML=html;
  const ta=document.getElementById('ta');
  if(ta){
    ta.addEventListener('input',()=>{
      const v=ta.value.trim();
      const btn=document.getElementById('nextBtn');
      if(btn) btn.disabled=!v;
      const cc=document.getElementById('cc');
      if(cc) cc.textContent=ta.value.length;
      if(v.length>30&&q.followUp&&!document.getElementById('fuBox')){
        const div=document.createElement('div');
        div.className='card followup-box';div.id='fuBox';
        div.innerHTML=`<div class="fl">${t('followup_label')}</div><p>${q.followUp}</p>`;
        area.appendChild(div);
      }
    });
  }
}

function onInput(el){
  const v=el.value.trim();
  const btn=document.getElementById('nextBtn');
  if(btn) btn.disabled=!v;
  const cc=document.getElementById('cc');
  if(cc) cc.textContent=el.value.length;
}

function saveCurrentAnswer(){
  const ta=document.getElementById('ta');
  if(ta){ S.answers[questions()[S.idx].id]=ta.value; }
}
function nextQ(){ saveCurrentAnswer(); S.idx++; save(); renderQ(); }
function prevQ(){ if(S.idx>0){ saveCurrentAnswer(); S.idx--; save(); renderQ(); } }
function skipQ(){ S.answers[questions()[S.idx].id]=''; S.idx++; save(); renderQ(); }

// ══════════════════════════════════════════════
// BELIEF SCORING
// ══════════════════════════════════════════════
function scoreBeliefs(){
  const txt=Object.values(S.answers).join(' ').toLowerCase();
  const pool=beliefs();
  const scored=pool.map(b=>{
    let sc=0;
    if(b.key==='worth'&&/leistung|genug|wert|verdienen|besser|perfekt|stolz|achieve|worth|enough|perform/.test(txt)) sc+=4;
    if(b.key==='love'&&/liebe|anerkennung|verdienen|bedingung|love|earn|recognition|condition/.test(txt)) sc+=4;
    if(b.key==='feelings'&&/gefühl|zeigen|weinen|wut|schwach|feeling|show|emotion|too much/.test(txt)) sc+=4;
    if(b.key==='safety'&&/angst|sicher|gefahr|fear|safe|danger|guard|unsicher/.test(txt)) sc+=4;
    if(b.key==='boundaries'&&/nein|grenz|ablehnung|no|boundary|limit|reject/.test(txt)) sc+=4;
    if(b.key==='alone'&&/allein|hilfe|schwäche|alone|help|weakness|selbst|self/.test(txt)) sc+=4;
    if(b.key==='critic'&&/fehler|kritik|streng|mistake|critic|harsh|wrong|falsch/.test(txt)) sc+=4;
    if(b.key==='invisible'&&/auffallen|sichtbar|invisible|seen|angreifbar|vulnerable/.test(txt)) sc+=4;
    if(b.key==='control'&&/kontroll|control|unberechenbar|unpredictable|macht|power/.test(txt)) sc+=4;
    if(b.key==='good'&&/gut|liebenswert|good|lovable|sicher|safe|geborgen/.test(txt)) sc+=3;
    sc+=Math.random()*1.5;
    return{...b,sc};
  });
  scored.sort((a,b)=>b.sc-a.sc);
  return scored.slice(0,6);
}

function generatePreview(){
  S.beliefs=scoreBeliefs(); save();
  const wrap=document.getElementById('previewBeliefs');
  if(!wrap) return;
  wrap.innerHTML='';
  // Show only first 2 beliefs as teaser
  S.beliefs.slice(0,2).forEach((b,i)=>{
    const div=document.createElement('div');
    div.className='preview-belief';
    div.style.animationDelay=(i*.08)+'s';
    div.innerHTML=`
      <div class="pb-area">${b.area}</div>
      <div class="pb-text">„${b.text}"</div>
      <div class="pb-insight">${b.insight}</div>
    `;
    wrap.appendChild(div);
  });
  // Blurred teaser for remaining
  const blur=document.createElement('div');
  blur.style.cssText='filter:blur(6px);opacity:.4;pointer-events:none;margin-bottom:8px;';
  S.beliefs.slice(2,4).forEach(b=>{
    blur.innerHTML+=`<div class="preview-belief" style="margin-bottom:12px;"><div class="pb-area">${b.area}</div><div class="pb-text">„${b.text}"</div></div>`;
  });
  wrap.appendChild(blur);
}

// CLAUDE ANALYSIS
// ══════════════════════════════════════════════
async function startAnalysis(){
  showPhase('loading');
  const steps=document.getElementById('loadingSteps');
  const stepTexts=t('loading_steps_text');
  if(steps){
    steps.innerHTML='';
    stepTexts.forEach((s,i)=>{
      steps.innerHTML+=`<div class="loading-step" id="ls-${i}"><div class="ls-dot"></div>${s}</div>`;
    });
  }
  // Animate steps
  for(let i=0;i<stepTexts.length;i++){
    await new Promise(r=>setTimeout(r,800));
    const el=document.getElementById('ls-'+i);
    if(el) el.classList.add('done');
  }
  // Build prompt
  const answersText=questions().map((q,i)=>{
    const a=S.answers[q.id];
    return a&&a.trim()?`[${i+1}] ${q.question}\n→ ${a.trim()}`:'';
  }).filter(Boolean).join('\n\n');

  const beliefsList=S.beliefs.map(b=>`- „${b.text}" (${b.area})`).join('\n');
  const isDE=lang==='de';

  const systemPrompt=isDE
    ?`Du bist ein erfahrener Psychologe und Coach mit Fokus auf Inneres-Kind-Arbeit und kognitive Verhaltenstherapie. Du analysierst Selbstreflexions-Antworten und gibst eine direkte, warme, persönliche Rückmeldung. Keine Diagnosen. Keine esoterische Sprache. Keine Floskeln. Maximal 350 Wörter. Nutze **Fettschrift** für Schlüsselbegriffe.`
    :`You are an experienced psychologist and coach specializing in inner child work and cognitive behavioral therapy. You analyze self-reflection answers and provide direct, warm, personal feedback. No diagnoses. No esoteric language. No platitudes. Maximum 350 words. Use **bold** for key terms.`;

  const userPrompt=isDE
    ?`Hier sind die Antworten einer Person auf 12 Reflexionsfragen zum Inneren Kind:\n\n${answersText}\n\nDie identifizierten Glaubenssätze:\n${beliefsList}\n\nBitte erstelle:\n1. Das dominante Kernmuster in 1-2 Sätzen (direkt und präzise)\n2. Den wahrscheinlichen Ursprung in der Kindheit (kurz, ohne Vorwurf)\n3. Wie dieses Muster sich heute in Beruf, Beziehungen und Selbstbild zeigt\n4. Drei neue stärkende Glaubenssätze als konkreten Gegenentwurf (in Ich-Form, nummeriert)\n5. Drei konkrete Handlungsschritte für die nächsten 30 Tage (nummeriert, mit kurzem Titel und Beschreibung)\n\nSchreibe in warmer, direkter Du-Form. Keine Diagnosen. Keine Floskeln.\n\nANTWORTE IN FOLGENDEM FORMAT:\n###ANALYSE###\n[deine Analyse hier]\n###NEUE_SÄTZE###\n1. [neuer Glaubenssatz]\n2. [neuer Glaubenssatz]\n3. [neuer Glaubenssatz]\n###HANDLUNGSPLAN###\n1. **[Titel]**: [Beschreibung]\n2. **[Titel]**: [Beschreibung]\n3. **[Titel]**: [Beschreibung]`
    :`Here are a person's answers to 12 inner child reflection questions:\n\n${answersText}\n\nIdentified core beliefs:\n${beliefsList}\n\nPlease create:\n1. The dominant core pattern in 1-2 sentences (direct and precise)\n2. The likely childhood origin (brief, without blame)\n3. How this pattern shows up today in work, relationships, and self-image\n4. Three new empowering beliefs as a concrete counter-narrative (in first person, numbered)\n5. Three concrete action steps for the next 30 days (numbered, with short title and description)\n\nWrite in a warm, direct second-person voice. No diagnoses. No platitudes.\n\nRESPOND IN THIS FORMAT:\n###ANALYSIS###\n[your analysis here]\n###NEW_BELIEFS###\n1. [new belief]\n2. [new belief]\n3. [new belief]\n###ACTION_PLAN###\n1. **[Title]**: [Description]\n2. **[Title]**: [Description]\n3. **[Title]**: [Description]`;

  try {
    let analysisText='';
    // If no API key configured, use fallback
    if(CONFIG.CLAUDE_API_KEY==='YOUR_CLAUDE_API_KEY'){
      analysisText=getFallbackAnalysis();
    } else {
      const response=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':CONFIG.CLAUDE_API_KEY,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:systemPrompt,
          messages:[{role:'user',content:userPrompt}]
        })
      });
      const data=await response.json();
      analysisText=data.content&&data.content[0]?data.content[0].text:getFallbackAnalysis();
    }
    S.aiAnalysis=analysisText; S.phase='report'; S.paid=true; save();
    showFullReport();
  } catch(e) {
    S.aiAnalysis=getFallbackAnalysis(); S.phase='report'; save();
    showFullReport();
  }
}

function getFallbackAnalysis(){
  const isDE=lang==='de';
  return isDE
    ?`###ANALYSE###\nDeine Antworten zeigen ein **klares Muster**: Du hast früh gelernt, dich anzupassen und wenig Raum für deine eigenen Bedürfnisse zu beanspruchen. Das hat dich funktionsfähig gemacht — aber auf Kosten deiner inneren Stimme.\n\nDer **Ursprung** liegt wahrscheinlich in einem Umfeld, das wenig Raum für Emotionen und individuelle Grenzen hatte. Nicht aus Böswilligkeit — sondern weil das System keine Kapazität für mehr hatte.\n\nHeute zeigt sich das: **Im Beruf** übernimmst du mehr Verantwortung als nötig. **In Beziehungen** gibst du viel und nimmst wenig. **Im Selbstbild** bist du dein härtester Richter.\n###NEUE_SÄTZE###\n1. Ich bin genug — genau so wie ich bin, in diesem Moment.\n2. Meine Bedürfnisse sind genauso gültig wie die Bedürfnisse anderer.\n3. Ich darf Hilfe annehmen — das ist Stärke, keine Schwäche.\n###HANDLUNGSPLAN###\n1. **Tägliche Selbstfrage**: Stelle dir jeden Abend eine Frage: „Was habe ich heute für mich getan?" Schreib die Antwort auf.\n2. **Grenzen üben**: Sage diese Woche einmal Nein zu etwas, das du normalerweise aus Pflichtgefühl annimmst.\n3. **Brief ans innere Kind**: Schreibe einen Brief an das Kind, das du warst. Was hat es gebraucht? Was würdest du ihm heute sagen?`
    :`###ANALYSIS###\nYour answers reveal a **clear pattern**: you learned early to adapt and claim little space for your own needs. This made you highly functional — but at the cost of your inner voice.\n\nThe **origin** likely lies in an environment that left little room for emotions and individual limits. Not from malice — but because the system had no capacity for more.\n\nToday this shows up: **At work** you take on more responsibility than necessary. **In relationships** you give much and receive little. **In your self-image** you are your own harshest judge.\n###NEW_BELIEFS###\n1. I am enough — exactly as I am, in this moment.\n2. My needs are just as valid as the needs of others.\n3. I am allowed to receive help — that is strength, not weakness.\n###ACTION_PLAN###\n1. **Daily self-question**: Ask yourself every evening: "What did I do for myself today?" Write the answer down.\n2. **Practice boundaries**: Say no this week to something you would normally accept out of obligation.\n3. **Letter to your inner child**: Write a letter to the child you were. What did they need? What would you say to them today?`;
}

  showPhase('report');

  renderStats();
  parseAndRenderAnalysis();
  renderBeliefs();
}

function renderStats(){
  const ans=Object.values(S.answers).filter(a=>a&&a.trim()).length;
  const words=Object.values(S.answers).join(' ').split(/\s+/).filter(Boolean).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-tile" style="animation-delay:.08s"><div class="stat-n">${ans}</div><div class="stat-l">${t('stat_answered')}</div></div>
    <div class="stat-tile" style="animation-delay:.14s"><div class="stat-n">${words}</div><div class="stat-l">${t('stat_words')}</div></div>
    <div class="stat-tile" style="animation-delay:.2s"><div class="stat-n">${S.beliefs.length}</div><div class="stat-l">${t('stat_beliefs')}</div></div>
  `;
}

function parseAndRenderAnalysis(){
  const raw=S.aiAnalysis||'';
  const isDE=lang==='de';
  const aKey=isDE?'###ANALYSE###':'###ANALYSIS###';
  const nbKey=isDE?'###NEUE_SÄTZE###':'###NEW_BELIEFS###';
  const apKey='###HANDLUNGSPLAN###';
  const apKeyEN='###ACTION_PLAN###';

  function extract(text,startKey,endKeys){
    const start=text.indexOf(startKey);
    if(start===-1) return '';
    let content=text.slice(start+startKey.length);
    for(const ek of endKeys){
      const end=content.indexOf(ek);
      if(end!==-1) content=content.slice(0,end);
    }
    return content.trim();
  }

  const allKeys=[aKey,nbKey,apKey,apKeyEN];
  const analysis=extract(raw,aKey,allKeys.filter(k=>k!==aKey));
  const newBeliefs=extract(raw,nbKey,allKeys.filter(k=>k!==nbKey));
  const actionPlan=extract(raw,isDE?apKey:apKeyEN,allKeys.filter(k=>k!==apKey&&k!==apKeyEN));

  // Render analysis
  const atEl=document.getElementById('aiAnalysisText');
  if(atEl&&analysis){
    atEl.innerHTML=analysis.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  } else if(atEl){
    atEl.innerHTML=raw.replace(/###.*?###/g,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  }

  // Render new beliefs
  if(newBeliefs){
    const nbCard=document.getElementById('newBeliefsCard');
    const nbList=document.getElementById('newBeliefsList');
    if(nbCard&&nbList){
      nbCard.style.display='block';
      nbList.innerHTML='';
      newBeliefs.split('\n').filter(l=>l.trim()).forEach(line=>{
        const clean=line.replace(/^\d+\.\s*/,'').trim();
        if(clean){ nbList.innerHTML+=`<div class="new-belief-item">„${clean}"</div>`; }
      });
    }
  }

  // Render action plan
  if(actionPlan){
    const acCard=document.getElementById('actionCard');
    const acList=document.getElementById('actionStepsList');
    if(acCard&&acList){
      acCard.style.display='block';
      acList.innerHTML='';
      let stepNum=0;
      actionPlan.split('\n').filter(l=>l.trim()).forEach(line=>{
        const clean=line.replace(/^\d+\.\s*/,'').trim();
        if(clean){
          stepNum++;
          const parts=clean.split(':');
          const title=parts[0].replace(/\*\*/g,'').trim();
          const desc=parts.slice(1).join(':').trim();
          acList.innerHTML+=`<div class="action-step"><div class="as-num">${stepNum}</div><div class="as-text"><strong>${title}</strong>${desc||''}</div></div>`;
        }
      });
    }
  }
}

function renderBeliefs(){
  const wrap=document.getElementById('beliefsWrap');
  if(!wrap) return;
  wrap.innerHTML='';
  S.beliefs.forEach((b,i)=>{
    const rating=S.ratings[b.key]||null;
    const div=document.createElement('div');
    div.className='belief-card'+(rating?' '+rating:'');
    div.id='bc-'+b.key;
    div.style.animationDelay=(i*.07)+'s';
    div.innerHTML=`
      <div class="b-meta">
        <span class="b-num">${t('q_step').replace('Frage','').replace('Question','')} ${i+1}</span>
        <span class="b-area">${b.area}</span>
      </div>
      <div class="b-quote">„${b.text}"</div>
      <div class="b-insight">${b.insight}</div>
      <div class="b-origin">🌱 ${b.origin}</div>
      <div class="rating-row">
        <span class="rbadge rb-g ${rating==='enabling'?'on':''}" onclick="rate('${b.key}','enabling')">${t('rb_enabling')}</span>
        <span class="rbadge rb-r ${rating==='limiting'?'on':''}" onclick="rate('${b.key}','limiting')">${t('rb_limiting')}</span>
        <span class="rbadge rb-n ${rating==='neutral'?'on':''}" onclick="rate('${b.key}','neutral')">${t('rb_neutral')}</span>
      </div>
      <span class="refl-label">Reflexion</span>
      <textarea class="refl-input" placeholder="${t('refl_placeholder')}" onchange="saveRefl('${b.key}',this.value)">${S.reflections[b.key]||''}</textarea>
    `;
    wrap.appendChild(div);
  });
}

function rate(key,r){
  S.ratings[key]=r; save();
  const card=document.getElementById('bc-'+key);
  if(!card) return;
  card.className='belief-card '+r;
  card.querySelectorAll('.rbadge').forEach(b=>b.classList.remove('on'));
  const map={enabling:0,limiting:1,neutral:2};
  card.querySelectorAll('.rbadge')[map[r]]?.classList.add('on');
  toast(t('toast_saved'));
}
function saveRefl(key,val){ S.reflections[key]=val; save(); }

// ══════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════
function exportPDF(){
  toast(t('toast_pdf'));
  setTimeout(()=>window.print(),300);
}

function exportTxt(){
  const isDE=lang==='de';
  let out=isDE
    ?'════════════════════════════════\n  COREMAP — MEIN PERSÖNLICHES PROFIL\n  Erstellt: '+new Date().toLocaleDateString('de-DE')+'\n════════════════════════════════\n\n'
    :'════════════════════════════════\n  COREMAP — MY PERSONAL PROFILE\n  Created: '+new Date().toLocaleDateString('en-US')+'\n════════════════════════════════\n\n';

  out+=(isDE?'── MEINE ANTWORTEN ──\n\n':'── MY ANSWERS ──\n\n');
  questions().forEach((q,i)=>{
    const a=S.answers[q.id];
    if(a&&a.trim()) out+=`[${i+1}] ${q.question}\n→ ${a.trim()}\n\n`;
  });

  if(S.aiAnalysis){
    out+='\n'+(isDE?'── KI-ANALYSE ──\n\n':'── AI ANALYSIS ──\n\n');
    out+=S.aiAnalysis.replace(/###.*?###\n?/g,'').replace(/\*\*/g,'').trim()+'\n\n';
  }

  out+='\n'+(isDE?'── GLAUBENSSÄTZE ──\n\n':'── CORE BELIEFS ──\n\n');
  S.beliefs.forEach((b,i)=>{
    const r=S.ratings[b.key];
    const rl=isDE?(r==='enabling'?'✓ FÖRDERLICH':r==='limiting'?'⚠ LIMITIEREND':'◎ NEUTRAL'):(r==='enabling'?'✓ EMPOWERING':r==='limiting'?'⚠ LIMITING':'◎ NEUTRAL');
    out+=`${i+1}. „${b.text}"\n   ${b.area} · ${rl}\n`;
    const ref=S.reflections[b.key];
    if(ref) out+=`   → ${ref}\n`;
    out+='\n';
  });

  const blob=new Blob([out],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='coremap-profile-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
  toast(t('toast_txt'));
}

function restartAll(){
  const msg=lang==='de'?'Wirklich neu starten? Alle Daten werden gelöscht.':'Really start over? All data will be deleted.';
  if(!confirm(msg)) return;
  try{localStorage.removeItem(SK);}catch(e){}
  S={phase:'welcome',idx:0,answers:{},beliefs:[],ratings:{},reflections:{},aiAnalysis:null,paid:false};
  showPhase('welcome');
}

// TOAST
// ══════════════════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
