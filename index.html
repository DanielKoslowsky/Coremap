<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Finde in 20 Minuten heraus, welche Kindheitsprägung dich heute sabotiert — mit deinem persönlichen KI-Report.">
<meta property="og:title" content="Coremap — Know Your Core">
<meta property="og:description" content="Finde in 20 Minuten heraus, welche Kindheitsprägung dich heute sabotiert.">
<meta property="og:image" content="https://coremap.app/og.jpg">
<title>Coremap — Know Your Core</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Syne:wght@300;400;500;600&display=swap');

:root {
  --bg:       #090806;
  --bg-2:     #111009;
  --bg-3:     #1A1812;
  --surface:  #161410;
  --s2:       #201E18;
  --ink:      #EDE8DF;
  --ink-2:    #9A9080;
  --ink-3:    #504840;
  --gold:     #C9A96E;
  --gold-2:   #E8CA8E;
  --gold-dim: rgba(201,169,110,0.10);
  --gold-glow:rgba(201,169,110,0.18);
  --rose:     #B87060;
  --border:   rgba(201,169,110,0.13);
  --border-2: rgba(237,232,223,0.06);
  --ease:     cubic-bezier(0.4,0,0.2,1);
  --ease-out: cubic-bezier(0,0,0.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:16px;}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── AMBIENT ── */
.ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 5%, rgba(201,169,110,0.08) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 90% 90%, rgba(184,112,96,0.06) 0%,transparent 50%),
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(9,8,6,0) 30%,rgba(9,8,6,0.4) 100%);
}
.grain{
  position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 24px;}
section{padding:80px 0;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:18px 0;
  transition:background .4s var(--ease),border-color .4s;
  border-bottom:1px solid transparent;
}
nav.scrolled{
  background:rgba(9,8,6,0.92);
  backdrop-filter:blur(12px);
  border-color:var(--border-2);
}
.nav-inner{
  max-width:720px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:18px;letter-spacing:.18em;
  color:var(--gold);text-transform:uppercase;
  text-decoration:none;
}
.nav-right{display:flex;align-items:center;gap:12px;}
.lang-toggle{
  display:flex;gap:3px;
  background:var(--s2);
  border:1px solid var(--border-2);
  border-radius:99px;padding:3px;
}
.lt-btn{
  background:none;border:none;
  font-family:'Syne',sans-serif;
  font-size:10.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-3);cursor:pointer;
  padding:4px 11px;border-radius:99px;
  transition:all .2s;
}
.lt-btn.on{background:var(--gold-dim);color:var(--gold);}
.nav-cta{
  background:var(--gold);color:var(--bg);
  border:none;border-radius:99px;
  padding:9px 20px;font-family:'Syne',sans-serif;
  font-size:12.5px;font-weight:600;
  letter-spacing:.04em;cursor:pointer;
  transition:all .25s var(--ease);
  text-decoration:none;display:inline-flex;
}
.nav-cta:hover{background:var(--gold-2);transform:translateY(-1px);}

/* ── HERO ── */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:120px 0 80px;
}
.hero-eyebrow{
  font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold);font-weight:500;
  margin-bottom:28px;
  display:flex;align-items:center;gap:12px;
  animation:fadeUp .8s var(--ease) both;
}
.hero-eyebrow::before{
  content:'';width:32px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold));
}
.hero-h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(38px,8vw,68px);
  font-weight:400;line-height:1.05;
  color:var(--ink);
  margin-bottom:10px;
  animation:fadeUp .8s .08s var(--ease) both;
}
.hero-h1 em{font-style:italic;color:var(--gold);}
.hero-h1-2{
  font-family:'Playfair Display',serif;
  font-size:clamp(38px,8vw,68px);
  font-weight:400;line-height:1.05;
  color:var(--ink-2);
  margin-bottom:32px;
  animation:fadeUp .8s .14s var(--ease) both;
}
.hero-sub{
  font-size:17px;color:var(--ink-2);font-weight:300;
  max-width:520px;line-height:1.85;
  margin-bottom:40px;
  animation:fadeUp .8s .2s var(--ease) both;
}
.hero-sub strong{color:var(--ink);font-weight:500;}
.hero-cta-group{
  display:flex;flex-direction:column;
  align-items:flex-start;gap:14px;
  animation:fadeUp .8s .28s var(--ease) both;
}
.cta-primary{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--gold);color:var(--bg);
  border:none;border-radius:99px;
  padding:16px 36px;font-family:'Syne',sans-serif;
  font-size:15px;font-weight:600;
  cursor:pointer;text-decoration:none;
  transition:all .3s var(--ease);
  box-shadow:0 4px 24px rgba(201,169,110,0.3);
  letter-spacing:.02em;
}
.cta-primary:hover{background:var(--gold-2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,169,110,0.4);}
.cta-arrow{font-size:18px;transition:transform .3s var(--ease);}
.cta-primary:hover .cta-arrow{transform:translateX(4px);}
.cta-sub{
  font-size:12px;color:var(--ink-3);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.cta-check{color:var(--gold);font-size:11px;}
.hero-social-proof{
  margin-top:56px;
  padding-top:32px;
  border-top:1px solid var(--border-2);
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  animation:fadeUp .8s .36s var(--ease) both;
}
.sp-number{
  font-family:'Playfair Display',serif;
  font-size:28px;color:var(--gold);font-weight:400;
}
.sp-text{font-size:13px;color:var(--ink-3);line-height:1.4;}
.sp-divider{width:1px;height:36px;background:var(--border-2);}

/* ── HOOK SECTION ── */
.hook-section{padding:60px 0 80px;}
.hook-card{
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:20px;
  padding:48px;
  position:relative;overflow:hidden;
}
.hook-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.hook-card::after{
  content:'';position:absolute;
  top:-100px;right:-100px;
  width:300px;height:300px;
  background:radial-gradient(circle,var(--gold-dim) 0%,transparent 70%);
  pointer-events:none;
}
.hook-q{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,4vw,30px);
  font-weight:400;line-height:1.35;
  color:var(--ink);margin-bottom:32px;
  font-style:italic;
}
.hook-items{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;margin-bottom:32px;
}
.hook-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:16px;background:var(--bg-3);
  border:1px solid var(--border-2);border-radius:12px;
}
.hi-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.hi-text{font-size:14px;color:var(--ink-2);line-height:1.6;}
.hook-truth{
  font-size:15px;color:var(--ink-2);line-height:1.75;
  border-left:2px solid var(--gold);
  padding-left:20px;
}
.hook-truth strong{color:var(--gold);font-weight:500;}

/* ── HOW IT WORKS ── */
.section-label{
  font-size:10.5px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gold);font-weight:500;margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--gold-dim);}
.section-h2{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,42px);
  font-weight:400;line-height:1.2;
  margin-bottom:14px;
}
.section-h2 em{font-style:italic;color:var(--gold);}
.section-sub{font-size:15px;color:var(--ink-2);font-weight:300;line-height:1.8;margin-bottom:48px;max-width:500px;}

.steps{display:flex;flex-direction:column;gap:0;}
.step{
  display:flex;gap:28px;padding:28px 0;
  border-bottom:1px solid var(--border-2);
  position:relative;
}
.step:last-child{border-bottom:none;}
.step-num{
  width:44px;height:44px;flex-shrink:0;
  border:1px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:16px;color:var(--gold);
  background:var(--gold-dim);
  margin-top:2px;
}
.step-content{}
.step-title{
  font-size:16px;font-weight:500;
  color:var(--ink);margin-bottom:6px;
}
.step-desc{font-size:14px;color:var(--ink-2);line-height:1.7;}
.step-time{
  font-size:11px;color:var(--gold);
  background:var(--gold-dim);
  border:1px solid var(--border);
  padding:2px 10px;border-radius:99px;
  display:inline-block;margin-top:8px;font-weight:500;
}

/* ── WHAT YOU GET ── */
.deliverables{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;margin-top:40px;
}
.deliv{
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:14px;padding:24px;
  transition:border-color .3s var(--ease),transform .3s var(--ease);
}
.deliv:hover{border-color:var(--border);transform:translateY(-3px);}
.deliv-icon{font-size:24px;margin-bottom:12px;}
.deliv-title{font-size:15px;font-weight:500;margin-bottom:6px;}
.deliv-desc{font-size:13px;color:var(--ink-2);line-height:1.65;}

/* ── TESTIMONIALS ── */
.testimonials{display:flex;flex-direction:column;gap:16px;margin-top:40px;}
.testi{
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:14px;padding:24px 28px;
  position:relative;
}
.testi::before{
  content:'"';position:absolute;top:16px;right:22px;
  font-family:'Playfair Display',serif;
  font-size:48px;color:var(--gold);opacity:.2;
  line-height:1;
}
.testi-text{
  font-size:15px;color:var(--ink-2);
  line-height:1.75;margin-bottom:16px;
  font-style:italic;
}
.testi-author{
  display:flex;align-items:center;gap:10px;
}
.testi-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--gold-dim);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.testi-name{font-size:13px;font-weight:500;color:var(--ink);}
.testi-role{font-size:11.5px;color:var(--ink-3);}
.stars{color:var(--gold);font-size:12px;letter-spacing:2px;margin-bottom:10px;}

/* ── PRICING ── */
.pricing-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px;
  text-align:center;
  position:relative;overflow:hidden;
  margin-top:40px;
}
.pricing-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.pricing-card::after{
  content:'';position:absolute;
  bottom:-80px;left:50%;transform:translateX(-50%);
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(201,169,110,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.price-badge{
  display:inline-block;
  background:var(--gold-dim);color:var(--gold);
  border:1px solid var(--border);
  font-size:11px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;padding:5px 16px;
  border-radius:99px;margin-bottom:24px;
}
.price-main{
  display:flex;align-items:flex-start;justify-content:center;
  gap:4px;margin-bottom:8px;
}
.price-currency{
  font-size:22px;color:var(--ink-2);
  margin-top:10px;font-weight:300;
}
.price-amount{
  font-family:'Playfair Display',serif;
  font-size:72px;font-weight:400;
  color:var(--ink);line-height:1;
}
.price-note{font-size:13px;color:var(--ink-3);margin-bottom:32px;}
.price-features{
  display:flex;flex-direction:column;gap:12px;
  max-width:340px;margin:0 auto 36px;
  text-align:left;
}
.pf-item{
  display:flex;align-items:flex-start;gap:10px;
  font-size:14px;color:var(--ink-2);line-height:1.5;
}
.pf-check{color:var(--gold);font-size:13px;margin-top:1px;flex-shrink:0;}
.order-bump{
  background:var(--bg-3);
  border:1px dashed var(--border);
  border-radius:12px;padding:18px 22px;
  max-width:380px;margin:0 auto 28px;
  display:flex;align-items:flex-start;gap:14px;
  text-align:left;
}
.ob-checkbox{
  width:20px;height:20px;border-radius:5px;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--bg);flex-shrink:0;margin-top:2px;
}
.ob-text{font-size:13px;color:var(--ink-2);line-height:1.55;}
.ob-text strong{display:block;color:var(--ink);font-weight:500;margin-bottom:3px;}
.ob-price{color:var(--gold);font-weight:600;}
.pricing-cta{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--gold);color:var(--bg);
  border:none;border-radius:99px;
  padding:18px 44px;font-family:'Syne',sans-serif;
  font-size:15px;font-weight:600;
  cursor:pointer;text-decoration:none;
  transition:all .3s var(--ease);
  box-shadow:0 4px 28px rgba(201,169,110,0.35);
  letter-spacing:.02em;width:100%;max-width:380px;
  justify-content:center;
}
.pricing-cta:hover{background:var(--gold-2);transform:translateY(-2px);box-shadow:0 8px 36px rgba(201,169,110,0.45);}
.pricing-trust{
  display:flex;align-items:center;justify-content:center;
  gap:16px;margin-top:18px;flex-wrap:wrap;
}
.pt-item{font-size:11.5px;color:var(--ink-3);display:flex;align-items:center;gap:5px;}

/* ── FAQ ── */
.faqs{margin-top:40px;display:flex;flex-direction:column;gap:2px;}
.faq{
  border:1px solid var(--border-2);border-radius:12px;
  overflow:hidden;margin-bottom:4px;
}
.faq-q{
  padding:18px 22px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  font-size:14.5px;font-weight:500;color:var(--ink);
  background:var(--surface);
  transition:background .2s;gap:12px;
}
.faq-q:hover{background:var(--s2);}
.faq-icon{
  color:var(--gold);font-size:18px;flex-shrink:0;
  transition:transform .3s var(--ease);
}
.faq.open .faq-icon{transform:rotate(45deg);}
.faq-a{
  max-height:0;overflow:hidden;
  transition:max-height .4s var(--ease-out);
  background:var(--bg-3);
}
.faq.open .faq-a{max-height:200px;}
.faq-a-inner{padding:18px 22px;font-size:14px;color:var(--ink-2);line-height:1.75;}

/* ── FINAL CTA ── */
.final-cta{
  text-align:center;
  padding:100px 0 80px;
}
.final-cta h2{
  font-family:'Playfair Display',serif;
  font-size:clamp(30px,6vw,50px);
  font-weight:400;line-height:1.15;
  margin-bottom:20px;
}
.final-cta h2 em{font-style:italic;color:var(--gold);}
.final-cta p{
  font-size:16px;color:var(--ink-2);font-weight:300;
  max-width:440px;margin:0 auto 40px;line-height:1.8;
}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border-2);
  padding:32px 0;
}
.footer-inner{
  max-width:720px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:16px;
}
.footer-logo{
  font-family:'Playfair Display',serif;
  font-size:15px;letter-spacing:.18em;color:var(--gold);
}
.footer-links{display:flex;gap:20px;flex-wrap:wrap;}
.footer-links a{font-size:12.5px;color:var(--ink-3);text-decoration:none;transition:color .2s;}
.footer-links a:hover{color:var(--ink-2);}
.footer-copy{font-size:12px;color:var(--ink-3);}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .hook-items{grid-template-columns:1fr;}
  .deliverables{grid-template-columns:1fr;}
  .hero-social-proof{gap:14px;}
  .sp-divider{display:none;}
  .pricing-card{padding:32px 22px;}
  .hook-card{padding:28px 22px;}
  section{padding:56px 0;}
}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="grain"></div>

<!-- NAV -->
<nav id="nav">
  <div class="nav-inner">
    <a href="#" class="nav-logo">Coremap</a>
    <div class="nav-right">
      <div class="lang-toggle">
        <button class="lt-btn on" onclick="setLang('de')" id="lt-de">DE</button>
        <button class="lt-btn" onclick="setLang('en')" id="lt-en">EN</button>
      </div>
      <a href="#pricing" class="nav-cta" data-i18n="nav_cta"></a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="wrap">
    <div class="hero-eyebrow" data-i18n="hero_eyebrow"></div>
    <h1 class="hero-h1" data-i18n="hero_h1"></h1>
    <div class="hero-h1-2" data-i18n="hero_h1_2"></div>
    <p class="hero-sub" data-i18n="hero_sub"></p>
    <div class="hero-cta-group">
      <a href="coremap.html" class="cta-primary" id="heroCta">
        <span data-i18n="hero_cta"></span>
        <span class="cta-arrow">→</span>
      </a>
      <div class="cta-sub">
        <span class="cta-check">✓</span><span data-i18n="trust_1"></span>
        <span class="cta-check">✓</span><span data-i18n="trust_2"></span>
        <span class="cta-check">✓</span><span data-i18n="trust_3"></span>
      </div>
    </div>
    <div class="hero-social-proof">
      <div>
        <div class="sp-number" id="spCount">247</div>
        <div class="sp-text" data-i18n="sp_text_1"></div>
      </div>
      <div class="sp-divider"></div>
      <div>
        <div class="sp-number">4.9</div>
        <div class="sp-text" data-i18n="sp_text_2"></div>
      </div>
      <div class="sp-divider"></div>
      <div>
        <div class="sp-number">20<span style="font-size:18px;color:var(--ink-2)"> min</span></div>
        <div class="sp-text" data-i18n="sp_text_3"></div>
      </div>
    </div>
  </div>
</section>

<!-- HOOK -->
<section class="hook-section">
  <div class="wrap">
    <div class="hook-card reveal">
      <div class="hook-q" data-i18n="hook_q"></div>
      <div class="hook-items" id="hookItems"></div>
      <div class="hook-truth" data-i18n="hook_truth"></div>
    </div>
  </div>
</section>

<!-- HOW IT WORKS -->
<section>
  <div class="wrap">

// LANG

let lang = localStorage.getItem('cm_lang') || 'de';

function setLang(l){
  lang = l;
  localStorage.setItem('cm_lang', l);
  document.documentElement.lang = l;
  document.getElementById('lt-de').classList.toggle('on', l==='de');
  document.getElementById('lt-en').classList.toggle('on', l==='en');
  renderAll();
}

function t(k){ return T[lang][k] || T['de'][k] || k; }

function renderAll(){
  // Simple text/html fields
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    const v = t(k);
    if(typeof v === 'string') el.innerHTML = v;
  });
  renderHookItems();
  renderSteps();
  renderDeliverables();
  renderTestimonials();
  renderPriceFeatures();
  renderFAQs();
}

function renderHookItems(){
  const c = document.getElementById('hookItems');
  if(!c) return;
  c.innerHTML = '';
  t('hook_items').forEach(item=>{
    c.innerHTML += `<div class="hook-item"><div class="hi-icon">${item.icon}</div><div class="hi-text">${item.text}</div></div>`;
  });
}

}

// ══════════════════════════════════════════════
// NAV SCROLL
// ══════════════════════════════════════════════
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
});

// ══════════════════════════════════════════════
// SCROLL REVEAL
// ══════════════════════════════════════════════
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){ e.target.classList.add('visible'); }
  });
},{threshold:0.12});

function initReveal(){
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

// ══════════════════════════════════════════════
// SOCIAL PROOF COUNTER (animated)
// ══════════════════════════════════════════════
function animateCounter(el, target, duration=1800){
  let start = 0;
  const step = timestamp => {
    if(!start) start = timestamp;
    const progress = Math.min((timestamp - start) / duration, 1);
    el.textContent = Math.floor(progress * target);
    if(progress < 1) requestAnimationFrame(step);
    else el.textContent = target;
  };
  requestAnimationFrame(step);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  setLang(lang);
  initReveal();
  // Animate counter when visible
  const counterEl = document.getElementById('spCount');
  const counterObs = new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting){
      animateCounter(counterEl, 247);
      counterObs.disconnect();
    }
  },{threshold:0.5});
  counterObs.observe(counterEl);
});
